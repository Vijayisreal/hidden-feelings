<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Feelings</title>
<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
}
header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}
textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:12px;
font-size:15px;
resize:none;
}
button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
button:hover{
opacity:0.9;
}
.post{
background:#1e293b;
padding:16px;
border-radius:12px;
margin-top:15px;
}
.tag{
font-size:12px;
opacity:0.7;
margin-bottom:6px;
}
.meta{
font-size:11px;
opacity:0.6;
margin-bottom:10px;
}
.commentBox{
margin-top:10px;
}
.comment{
background:#0f172a;
padding:8px;
border-radius:8px;
margin-top:6px;
font-size:14px;
}
.likeBtn{
background:#22c55e;
margin-right:8px;
}
.replyBtn{
background:#f59e0b;
}
select{
margin-bottom:10px;
padding:8px;
border-radius:8px;
border:none;
}
</style>
</head>
<body><header>Hidden Feelings</header><div class="container"><div class="card">
<h3>Share what you're feeling</h3><select id="emotion">
<option value="Sad">😞 Sad</option>
<option value="Anxiety">😨 Anxiety</option>
<option value="Love">❤️ Love</option>
<option value="Lonely">😔 Lonely</option>
<option value="Angry">😤 Angry</option>
<option value="Confused">😵 Confused</option>
</select><textarea id="feeling" placeholder="Write your thoughts... nobody will know who you are"></textarea><button onclick="postFeeling()">Share Anonymously</button>

</div><div id="posts"></div></div><script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function randomUser(){
return "User" + Math.floor(Math.random()*9000+1000);
}

function postFeeling(){

let text=document.getElementById("feeling").value;
let emotion=document.getElementById("emotion").value;

if(text.trim()==="") return;

let post={
 id:Date.now(),
 user:randomUser(),
 text:text,
 emotion:emotion,
 likes:0,
 comments:[]
};

posts.unshift(post);

save();

document.getElementById("feeling").value="";

renderPosts();
}

function likePost(id){

posts.forEach(p=>{
if(p.id===id){
p.likes++;
}
});

save();
renderPosts();
}

function addComment(id){

let input=document.getElementById("comment-"+id);
let text=input.value;

if(text.trim()==="") return;

posts.forEach(p=>{
if(p.id===id){
p.comments.push(text);
}
});

input.value="";

save();
renderPosts();
}

function save(){
localStorage.setItem("posts",JSON.stringify(posts));
}

function renderPosts(){

let container=document.getElementById("posts");
container.innerHTML="";

posts.forEach(p=>{

let div=document.createElement("div");
div.className="post";

let commentsHTML="";

p.comments.forEach(c=>{
commentsHTML+=`<div class='comment'>${c}</div>`;
});


div.innerHTML=`

<div class="tag">Emotion: ${p.emotion}</div>

<div class="meta">Posted by ${p.user}</div>

<p>${p.text}</p>

<button class="likeBtn" onclick="likePost(${p.id})">❤️ ${p.likes}</button>

<div class="commentBox">

<input id="comment-${p.id}" placeholder="Support them or give advice" style="width:70%;padding:8px;border-radius:8px;border:none">

<button class="replyBtn" onclick="addComment(${p.id})">Reply</button>

${commentsHTML}

</div>

`;

container.appendChild(div);

});

}

renderPosts();

</script></body>
</html>
